<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>점심 뭐 먹지?</title>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 { font-size: 1.6rem; margin-bottom: 12px; color: #111827; }

    .sub-info {
      margin-bottom: 16px;
      font-size: 0.8rem;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .kakao-btn {
      padding: 6px 10px;
      font-size: 0.75rem;
      border-radius: 6px;
      border: none;
      background: #fee500;
      cursor: pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height: 1;
    }

    .main-btn {
      width: 100%;
      padding: 14px;
      font-size: 1.1rem;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .menu-list { margin-top: 24px; display: flex; flex-direction: column; gap: 12px; }

    .menu-item {
      text-align: left;
      padding: 16px;
      border-radius: 12px;
      background: #f9fafb;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .rank-1 { border-left: 6px solid #ef4444; }
    .rank-2 { border-left: 6px solid #f59e0b; }
    .rank-3 { border-left: 6px solid #3b82f6; }

    .title { font-weight: bold; font-size: 1.05rem; }

    .place { font-size: 0.95rem; color: #374151; margin-top: 4px; }

    .link {
      margin-top: 10px;
      padding: 8px 12px;
      font-size: 0.85rem;
      border-radius: 8px;
      background: #10b981;
      color: white;
      border: none;
      cursor: pointer;
    }

    .title-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    
    .category {
      margin-top: 6px;
      font-size: 0.8rem;
      color: #6b7280;
    }
    
    .message { margin-top: 20px; font-size: 0.9rem; color: #6b7280; }
  </style>
</head>

<body>
  <div class="container">
    <h1>🍱 오늘 뭐 먹지?</h1>

    <div class="sub-info">
      <div id="updateText">📅 업데이트: </div>
      <button class="kakao-btn" onclick="openKakaoChat()">💬 맛집 추가</button>
    </div>

    <button class="main-btn" onclick="recommendMenus()">추천 받기</button>

    <div id="menu-list" class="menu-list"></div>

    <div id="message" class="message">버튼을 눌러보세요 😎</div>
  </div>

  <script src="menu.js"></script>

  <script>
    const kakaoChatUrl = "https://open.kakao.com/o/sakU9xqi";

    let menus = [];

    function init() {
      menus = parseMenus(window.rawMenus);

      document.getElementById("updateText").textContent =
        "📅 업데이트: " + (window.lastUpdate || "정보 없음");
    }

    function openKakaoChat() {
      const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

      if (!isMobile) return window.open(kakaoChatUrl, "_blank");

      window.location.href = `kakaotalk://openChat?url=${encodeURIComponent(kakaoChatUrl)}`;

      setTimeout(() => {
        window.location.href = kakaoChatUrl;
      }, 1500);
    }
    
    function getCategoryIcon(category) {
      switch(category) {
        case "한식": return "🍚";
        case "중식": return "🥢";
        case "일식": return "🍣";
        case "양식": return "🍝";
        default: return "🍽️";
      }
    }
    
    function openKakaoMap(link) {
      const placeId = link.split("/").pop();
      const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

      if (!isMobile) return window.open(link, "_blank");

      window.location.href = `kakaomap://place?id=${placeId}`;

      setTimeout(() => {
        window.location.href = link;
      }, 1500);
    }

    function parseMenus(raw) {
      return raw.trim().split("\n").map(line => {
        const [category, main, name, link] = line.split("|");
        return { category, main, name, link };
      });
    }

    function getRandomMenus(arr, count) {
      return [...arr].sort(() => Math.random() - 0.5).slice(0, count);
    }

    function recommendMenus() {
      const selected = getRandomMenus(menus, 3);

      const menuList = document.getElementById("menu-list");
      const message = document.getElementById("message");

      menuList.innerHTML = "";
      message.style.display = "none";

      selected.forEach((menu, index) => {
        const item = document.createElement("div");
        item.className = `menu-item rank-${index + 1}`;

        item.innerHTML = `
          <div class="title-row">
            <div class="title">${index + 1}순위 - ${menu.main}</div>
            <div class="category">${getCategoryIcon(menu.category)} ${menu.category}</div>
          </div>
          <div class="place">🏪 ${menu.name}</div>
          <button class="link" onclick="openKakaoMap('${menu.link}')">
            지도 보기
          </button>
        `;

        menuList.appendChild(item);
      });
    }

    window.onload = init;
  </script>
</body>
</html>
