<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>점심 뭐 먹지?</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 20px;
      color: #111827;
    }

    button.main-btn {
      width: 100%;
      padding: 14px;
      font-size: 1.1rem;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button.main-btn:active {
      transform: scale(0.97);
      background: #1d4ed8;
    }

    .menu-list {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-item {
      text-align: left;
      padding: 16px;
      border-radius: 12px;
      background: #f9fafb;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .rank-1 { border-left: 6px solid #ef4444; }
    .rank-2 { border-left: 6px solid #f59e0b; }
    .rank-3 { border-left: 6px solid #3b82f6; }

    .title {
      font-weight: bold;
      font-size: 1.05rem;
      margin-bottom: 6px;
    }

    .place {
      font-size: 0.95rem;
      color: #374151;
    }

    .link {
      margin-top: 10px;
      padding: 8px 12px;
      font-size: 0.85rem;
      border-radius: 8px;
      background: #10b981;
      color: white;
      border: none;
      cursor: pointer;
    }

    .link:active {
      background: #059669;
    }

    .message {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🍱 오늘 뭐 먹지?</h1>

    <button class="main-btn" onclick="recommendMenus()">추천 받기</button>

    <div id="menu-list" class="menu-list"></div>

    <div id="message" class="message">
      버튼을 눌러보세요 😎
    </div>
  </div>

  <!-- 데이터 -->
  <script src="menu.js"></script>

  <!-- 로직 -->
  <script>
    function getRandomMenus(arr, count) {
      const shuffled = [...arr].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, count);
    }

    function openKakaoMap(link) {
      const placeId = link.split('/').pop();
      const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

      // PC → 웹
      if (!isMobile) {
        window.open(link, '_blank');
        return;
      }

      // 모바일 → 앱 시도
      const appUrl = `kakaomap://place?id=${placeId}`;
      const webUrl = link;

      window.location.href = appUrl;

      // fallback
      setTimeout(() => {
        window.location.href = webUrl;
      }, 1500);
    }

    function recommendMenus() {
      const selectedMenus = getRandomMenus(menus, 3);

      const menuList = document.getElementById('menu-list');
      const message = document.getElementById('message');

      menuList.innerHTML = '';
      message.style.display = 'none';

      selectedMenus.forEach((menu, index) => {
        const item = document.createElement('div');
        item.className = `menu-item rank-${index + 1}`;

        item.innerHTML = `
          <div class="title">${index + 1}순위 - ${menu.main}</div>
          <div class="place">🏪 ${menu.name}</div>
          <button class="link" onclick="openKakaoMap('${menu.link}')">
            지도 보기
          </button>
        `;

        menuList.appendChild(item);
      });
    }
  </script>
</body>
</html>
